<script>
    let prestadores = [];
    let itensSelecionados = [];
    let agendamentos = [];
    let etapa = 1;
    let editingIndex = -1;
    let prestadorSelecionadoIndex = null;

    const produtos = {
        "Telemetria": [{desc:"Instalado veículos leves bloqueador", tempo:60}, {desc:"Instalado veículos leves e pesados + CAN", tempo:60}, {desc:"Instalado motos ou maquinários", tempo:40}, {desc:"Instalado veículos leves e pesados", tempo:40}],
        "Identificador": [{desc:"Instalado veículos leves e pesados identificador", tempo:60}, {desc:"Instalado veículos leves e pesados identificador + CAN", tempo:90}, {desc:"Instalado veículos leves e pesados identificador RFID", tempo:60}, {desc:"Instalado veículos leves e pesados identificador RFID + CAN", tempo:80}],
        "Trava de ignição": [{desc:"Instalado veículos leves imobilizador", tempo:80}, {desc:"Instalado veículos leves imobilizador RFID", tempo:80}, {desc:"Instalado veículos leves imobilizador RFID + CAN", tempo:90}, {desc:"Instalado veículos leves imobilizador + CAN", tempo:100}],
        "Videotelemetria": [{desc:"CobliCam (2 câmeras)", tempo:90}, {desc:"Cobli Multicam (3 câmeras internas)", tempo:120}, {desc:"Cobli Multicam (2 câmeras + 1 externa)", tempo:240}, {desc:"Cobli Multicam (4 câmeras)", tempo:240}, {desc:"Cobli Multicam (5 câmeras)", tempo:300}]
    };

    window.onload = async () => { 
        carregarProdutos(); 
        await carregarDadosDoBanco();
    };

    async function carregarDadosDoBanco() {
        const resP = await fetch('http://localhost:3000/api/prestadores');
        prestadores = await resP.json();
        renderizarListaPrestadores();
        
        const resA = await fetch('http://localhost:3000/api/agendamentos');
        agendamentos = await resA.json();
        document.getElementById("total-agend").innerText = agendamentos.length;
        renderPainel();
    }

    function showToast(mensagem) {
        let t = document.getElementById("toast");
        t.innerText = mensagem;
        t.style.display = "block";
        setTimeout(() => { t.style.display = "none"; }, 3000);
    }

    async function consultarDistancia(cepOrigem, enderecoPrestador) {
        try {
            const response = await fetch('http://localhost:3000/api/distancia', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ origin: cepOrigem, destination: enderecoPrestador })
            });
            const data = await response.json();
            if (data && data.status === 'OK' && data.rows && data.rows[0].elements[0].status === 'OK') {
                return parseFloat(data.rows[0].elements[0].distance.value) / 1000;
            }
            return null;
        } catch (e) { return null; }
    }

    function trocarAba(id, btn){
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('ativo'));
        if(btn) btn.classList.add('ativo');
        if(id === 'painel') atualizarFiltrosPrestador();
    }

    async function proximoPasso(n) {
        if(n === 2) {
            if(prestadores.length === 0) return alert("Cadastre um prestador primeiro!");
            const cepDigitado = document.getElementById('inputCep').value;
            if(!cepDigitado) return alert("Digite o CEP!");
            const btn = document.getElementById('btnBuscar');
            btn.disabled = true; btn.innerText = "Calculando...";
            let prestadoresFiltrados = [];
            for(let p of prestadores) {
                if (!p.endereco || p.endereco.trim() === "") continue;
                const dist = await consultarDistancia(cepDigitado, p.endereco);
                if(dist !== null) {
                    let datasProx = [];
                    let hoje = new Date();
                    const diasSemana = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sab"];
                    for(let i=0; i<14 && datasProx.length < 2; i++){
                        let d = new Date(); d.setDate(hoje.getDate() + i);
                        if(p.agenda.some(a => a.dia == diasSemana[d.getDay()])) datasProx.push(d.toLocaleDateString().slice(0, 5));
                    }
                    if(dist <= parseFloat(p.range)) {
                        p.distanciaFinal = dist.toFixed(1);
                        p.datasDisponiveis = datasProx.length > 0 ? datasProx.join(", ") : "Sem agenda";
                        prestadoresFiltrados.push(p);
                    }
                }
            }
            btn.disabled = false; btn.innerText = "Buscar Prestadores";
            if(prestadoresFiltrados.length === 0) return alert("Nenhum prestador encontrado.");
            renderizarListaPrestadoresSelecao(prestadoresFiltrados);
        }
        if(n === 3 && prestadorSelecionadoIndex === null) return alert("Selecione um prestador!");
        document.querySelectorAll('#consulta > div').forEach(div => div.style.display = 'none');
        document.getElementById('step-' + n).style.display = 'block';
        if(n === 3) rdaAgendamento(); 
    }

    function validarEAvancar() {
        let totalMinutos = itensSelecionados.reduce((a, b) => a + (b.tempo * b.qtd), 0);
        let horas = Math.ceil(totalMinutos / 60);
        let sel = document.querySelectorAll("#agenda-agendamento .selecionado");
        if (sel.length === 0) return alert("Selecione um horário!");
        let dataRef = sel[0].dataset.date;
        for(let s of sel) if(s.dataset.date !== dataRef) return alert("Todos os horários devem ser do mesmo dia!");
        if (sel.length !== horas) return alert("Selecione exatamente " + horas + " hora(s)!");
        proximoPasso(4);
    }

    function renderizarListaPrestadoresSelecao(lista) {
        document.getElementById('lista-prestadores-selecao').innerHTML = lista.map(p => `
            <div class="card">
                <strong>${p.nome}</strong> - ${p.cidade}/${p.uf}<br>
                <small>Distância: ${p.distanciaFinal} km | Próximas agendas: ${p.datasDisponiveis}</small>
                <br><button onclick="selecionarPrestadorPorObjeto('${p.nome}')">Selecionar</button>
            </div>
        `).join('');
    }

    function selecionarPrestadorPorObjeto(nome) {
        prestadorSelecionadoIndex = prestadores.findIndex(p => p.nome === nome);
        proximoPasso(3);
    }

    function updateButtons() {
        document.getElementById('btn-voltar').style.display = (etapa === 1) ? 'none' : 'inline-block';
        document.getElementById('btn-proximo').style.display = (etapa === 1) ? 'inline-block' : 'none';
        document.getElementById('btn-concluir').style.display = (etapa === 2) ? 'inline-block' : 'none';
    }

    function abrirCadastro(index = -1){
        editingIndex = index;
        document.getElementById("lista-prestadores-view").style.display="none";
        document.getElementById("cadastro-flow").style.display="block";
        etapa = 1; document.getElementById("etapa-1").style.display="block"; document.getElementById("etapa-2").style.display="none";
        criarGridCadastro("agenda-cadastro");
        if(index !== -1){
            let p = prestadores[index];
            document.getElementById("nomeEmpresa").value = p.nome;
            document.getElementById("endereco").value = p.endereco;
            document.getElementById("cidade").value = p.cidade;
            document.getElementById("uf").value = p.uf;
            document.getElementById("cep").value = p.cep;
            document.getElementById("responsavel").value = p.responsavel;
            document.getElementById("contatoResponsavel").value = p.contato;
            document.getElementById("qtdTecnicos").value = p.qtdTecnicos;
            document.getElementById("rangeAtendimento").value = p.range;
            p.agenda.forEach(item => {
                let cells = document.querySelectorAll("#agenda-cadastro .cell");
                cells.forEach(c => { if(c.dataset.dia == item.dia && c.dataset.hora == item.hora) c.classList.add("selecionado"); });
            });
        } else {
            document.querySelectorAll('input').forEach(i => i.value = "");
        }
        updateButtons();
    }

    function criarGridCadastro(id){
        let grid = document.getElementById(id); grid.innerHTML = "";
        ["Seg","Ter","Qua","Qui","Sex","Sab"].forEach(d=>{
            let card = document.createElement("div"); card.className = "agenda-day-card";
            card.innerHTML = `<div class="agenda-day-title">${d}</div>`;
            let wrapper = document.createElement("div"); wrapper.className = "slots-wrapper";
            for(let h=8;h<=18;h++){
                let cell = document.createElement("div"); cell.className="cell";
                cell.dataset.dia = d; cell.dataset.hora = `${h}:00`;
                cell.innerText = `${h}:00`;
                cell.onclick = () => cell.classList.toggle("selecionado");
                wrapper.appendChild(cell);
            }
            card.appendChild(wrapper); grid.appendChild(card);
        });
    }

    function mudarEtapa(dir){
        if (dir > 0 && etapa === 1) {
            const inputs = document.querySelectorAll("#etapa-1 input");
            for(let i of inputs) if(!i.value.trim()) return alert("Preencha todos os campos obrigatórios!");
        }
        document.getElementById("etapa-"+etapa).style.display="none";
        etapa += dir;
        if(etapa < 1) etapa = 1; if(etapa > 2) etapa = 2;
        document.getElementById("etapa-"+etapa).style.display="block";
        updateButtons();
    }

    async function salvarPrestador(){
        const inputs = document.querySelectorAll('#etapa-1 input');
        for(let i of inputs) if(!i.value.trim()) return alert("Preencha todos os campos!");
        let agenda = [...document.querySelectorAll('#agenda-cadastro .selecionado')].map(c => ({ dia: c.dataset.dia, hora: c.dataset.hora }));
        let p = { 
            nome: document.getElementById("nomeEmpresa").value, 
            endereco: document.getElementById("endereco").value, 
            cidade: document.getElementById("cidade").value, 
            uf: document.getElementById("uf").value, 
            cep: document.getElementById("cep").value, 
            responsavel: document.getElementById("responsavel").value, 
            contato: document.getElementById("contatoResponsavel").value, 
            qtdTecnicos: document.getElementById("qtdTecnicos").value, 
            range: document.getElementById("rangeAtendimento").value, 
            agenda: agenda 
        };
        await fetch('http://localhost:3000/api/prestadores', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(p)
        });
        await carregarDadosDoBanco();
        document.getElementById("cadastro-flow").style.display="none";
        document.getElementById("lista-prestadores-view").style.display="block";
        showToast("Prestador salvo no banco!");
    }

    function renderizarListaPrestadores(){
        document.getElementById("lista-prestadores").innerHTML = prestadores.map((p, i) => {
            let uniqueDays = [...new Set(p.agenda.map(a => a.dia))].length;
            return `<div class="card">
                <strong>${p.nome}</strong> - ${p.cidade}/${p.uf}<br>
                Técnicos: ${p.qtdTecnicos} | Dias c/ agenda: ${uniqueDays}
                <div style="margin-top:10px">
                    <button onclick="abrirCadastro(${i})">Editar</button> 
                    <button onclick="excluirPrestador(${i})">Excluir</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById("total-prest").innerText = prestadores.length;
    }

    async function excluirPrestador(i){ 
        await fetch(`http://localhost:3000/api/prestadores/${prestadores[i].id}`, { method: 'DELETE' });
        await carregarDadosDoBanco();
    }

    function carregarProdutos(){
        let select=document.getElementById("produto");
        for(let tipo in produtos){
            let group=document.createElement("optgroup"); group.label=tipo;
            produtos[tipo].forEach(p=>{
                let opt=document.createElement("option"); opt.value=p.tempo; opt.text=p.desc;
                group.appendChild(opt);
            });
            select.appendChild(group);
        }
    }

    function adicionarProduto(){
        let select = document.getElementById("produto");
        let qtd = parseInt(document.getElementById("quantidade").value) || 1;
        let tempoBase = parseInt(select.value);
        itensSelecionados.push({desc: select.options[select.selectedIndex].text, tempo: tempoBase, qtd: qtd});
        renderizarProdutos();
        if(prestadorSelecionadoIndex !== null) rdaAgendamento();
    }

    function renderizarProdutos(){
        let totalMinutos = itensSelecionados.reduce((a, b) => a + (b.tempo * b.qtd), 0);
        document.getElementById("horasNecessarias").innerText = Math.ceil(totalMinutos/60);
        document.getElementById("lista-produtos").innerHTML = itensSelecionados.map((i, idx) => 
            `<div class="item-lista">${i.desc} (Qtd: ${i.qtd} | Total: ${i.tempo * i.qtd} min) <button onclick="itensSelecionados.splice(${idx},1); renderizarProdutos(); rdaAgendamento();">x</button></div>`).join('');
    }

    function rdaAgendamento(){
        if(prestadorSelecionadoIndex === null) return;
        let container = document.getElementById("agenda-agendamento");
        container.innerHTML = "";
        let hoje = new Date();
        const diasSemana = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sab"];
        for(let i=0; i<14; i++){
            let data = new Date(); data.setDate(hoje.getDate() + i);
            let dNome = diasSemana[data.getDay()];
            let dStr = data.toLocaleDateString();
            let allSlots = prestadores[prestadorSelecionadoIndex].agenda.filter(a => a.dia == dNome);
            let availableSlots = allSlots.filter(item => !agendamentos.some(a => a.prestador == prestadores[prestadorSelecionadoIndex].nome && a.data == dStr && a.slots.includes(item.hora)));
            if(availableSlots.length > 0){
                let card = document.createElement("div"); card.className = "agenda-day-card";
                card.innerHTML = `<div class="agenda-day-title">${dStr.slice(0,5)} (${dNome})</div>`;
                let wrapper = document.createElement("div"); wrapper.className = "slots-wrapper";
                availableSlots.forEach(item => {
                    let div = document.createElement("div"); div.className = "cell";
                    div.innerText = item.hora; div.dataset.hora = item.hora; div.dataset.date = dStr;
                    div.onclick = () => {
                        let totalMinutos = itensSelecionados.reduce((a, b) => a + (b.tempo * b.qtd), 0);
                        let horas = Math.ceil(totalMinutos / 60);
                        let sel = document.querySelectorAll("#agenda-agendamento .selecionado");
                        if(sel.length > 0 && sel[0].dataset.date !== div.dataset.date) { sel.forEach(s => s.classList.remove('selecionado')); sel = []; }
                        if(!div.classList.contains("selecionado") && sel.length >= horas) return alert("Limite de "+horas+"h!");
                        div.classList.toggle("selecionado");
                    };
                    wrapper.appendChild(div);
                });
                card.appendChild(wrapper); container.appendChild(card);
            }
        }
    }

    async function concluirAgendamentoFinal(){
        const ticket = document.getElementById("ticket").value;
        const cli = document.getElementById("clienteNome").value;
        const sol = document.getElementById("solicitante").value;
        if(!ticket || !cli || !sol) return alert("Preencha todos os campos do cliente!");
        
        let totalMinutos = itensSelecionados.reduce((a, b) => a + (b.tempo * b.qtd), 0);
        let horas = Math.ceil(totalMinutos / 60);
        let sel = document.querySelectorAll("#agenda-agendamento .selecionado");
        if(sel.length === 0) return alert("Selecione um horário!");
        if(sel.length !== horas) return alert("Selecione exatamente " + horas + " hora(s)!");
        
        let p = prestadores[prestadorSelecionadoIndex];
        let agendamento = { 
            prestador: p.nome, qtdTecnicos: p.qtdTecnicos, produtos: itensSelecionados,
            data: sel[0].dataset.date, rawDate: new Date(), slots: [...sel].map(s => s.dataset.hora),
            ticket, cliente: cli, solicitante: sol
        };

        await fetch('http://localhost:3000/api/agendamentos', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(agendamento)
        });

        itensSelecionados = []; prestadorSelecionadoIndex = null;
        document.getElementById("lista-produtos").innerHTML = "";
        document.getElementById("horasNecessarias").innerText = "0";
        document.getElementById("quantidade").value = "1";
        document.getElementById("agenda-agendamento").innerHTML = "";
        document.getElementById("inputCep").value = "";
        document.getElementById("ticket").value = "";
        document.getElementById("clienteNome").value = "";
        document.getElementById("solicitante").value = "";
        
        await carregarDadosDoBanco();
        proximoPasso(1);
        showToast("Agendamento salvo no banco!");
    }

    function renderPainel(){
        let fInicio = document.getElementById("filtroDataInicio").value;
        let fFim = document.getElementById("filtroDataFim").value;
        let fPrest = document.getElementById("filtroPrestador").value;
        let filtrados = agendamentos.filter(a => {
            let dataA = a.rawDate ? new Date(a.rawDate).toISOString().split('T')[0] : "";
            let matchDate = (!fInicio || dataA >= fInicio) && (!fFim || dataA <= fFim);
            let matchPrest = (!fPrest || a.prestador === fPrest);
            return matchDate && matchPrest;
        });
        document.getElementById("painel-conteudo").innerHTML = filtrados.map((a, i) => `
            <div class="painel-item">
                <div><strong>Ticket: ${a.ticket}</strong> | Cliente: ${a.cliente}</div>
                <div><strong>${a.prestador}</strong> | Técnicos: ${a.qtdTecnicos} | Data: ${a.data} | Solicitante: ${a.solicitante}</div>
                <div style="margin: 5px 0; font-size: 0.9em; color: #555;">${Array.isArray(a.produtos) ? a.produtos.map(prod => `${prod.desc} (${prod.qtd}x)`).join('; ') : ""}</div>
            </div>`).join('');
    }

    function limparFiltros(){
        document.getElementById("filtroDataInicio").value = "";
        document.getElementById("filtroDataFim").value = "";
        document.getElementById("filtroPrestador").value = "";
        renderPainel();
    }

    function atualizarFiltrosPrestador(){
        let sel = document.getElementById("filtroPrestador");
        sel.innerHTML = '<option value="">Todos</option>';
        prestadores.forEach(p => sel.innerHTML += `<option value="${p.nome}">${p.nome}</option>`);
    }
</script>
