<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>APEX</title>
    <style>
        body { margin:0; font-family: Arial; background:#f4f6f8; }
        .topo { background:#2F4EA1; color:white; padding:15px 30px; display:flex; justify-content:space-between; }
        .menu { background:#1F3C88; padding:10px 30px; }
        .menu button { background:none; border:none; color:#cbd5e1; margin-right:20px; font-size:16px; cursor:pointer; }
        .menu button.ativo { color:white; border-bottom:2px solid #4da3ff; }
        .conteudo { padding:30px; }
        .aba { display:none; }
        .ativa { display:block; }
        .card { background:white; padding:20px; border-radius:8px; margin-bottom:20px; }
        input, select { padding:8px; margin:5px; }
        button.acao { background:#2F4EA1; color:white; border:none; padding:8px 15px; cursor:pointer; border-radius:4px; }
    </style>
</head>
<body>

<div class="topo">
    <strong>APEX</strong>
    <span>Agenda Prestadores</span>
</div>

<div class="menu">
    <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
    <button onclick="trocarAba('cadastro', this)">Prestadores</button>
    <button onclick="trocarAba('painel', this)">Painel</button>
</div>

<div class="conteudo">
    <div id="consulta" class="aba ativa">
        <div class="card">
            <h2>Novo Agendamento</h2>
            <input placeholder="Digite endereço ou CEP">
            <button class="acao" onclick="buscar()">Buscar</button>
        </div>

        <div id="fluxo-agendamento" style="display:none;">
            <div class="card" id="prestadorSelecionado"></div>
            <div class="card">
                <h3>Produtos</h3>
                <select id="produto"></select>
                <input type="number" id="quantidade" placeholder="Qtd">
                <button class="acao" onclick="adicionarProduto()">Adicionar</button>
                <div id="lista-produtos"></div>
                <p>Tempo estimado: <strong id="tempoTotalExibicao">0h</strong></p>
            </div>
            <div class="card">
                <h3>Agenda (Selecione horas livres)</h3>
                <div id="horarios"></div>
                <p id="alertaTempo" style="color:red;"></p>
                <button class="acao" onclick="concluirAgendamento()">Concluir</button>
            </div>
        </div>
    </div>

    <div id="cadastro" class="aba">
        <div id="lista-prestadores-view">
            <div class="card">
                <h2>Prestadores</h2>
                <button class="acao" onclick="abrirCadastro()">+ Cadastrar</button>
                <div id="lista-prestadores"></div>
            </div>
        </div>
        <div id="cadastro-flow" style="display:none;">
            <div class="card"><p>Etapa <span id="etapaAtual">1</span> de 4</p></div>
            <div class="card etapa" id="etapa1">
                <input id="nome" placeholder="Nome"><br>
                <input id="tecnicos" type="number" placeholder="Qtd Técnicos"><br>
            </div>
            <div class="card etapa" id="etapa2" style="display:none;">
                <input id="endereco" placeholder="Endereço"><br>
                <input id="raio" type="number" placeholder="Raio 1-100">
            </div>
            <div class="card etapa" id="etapa3" style="display:none;">
                <div id="agenda-semana"></div>
            </div>
            <div class="card etapa" id="etapa4" style="display:none;">
                <button class="acao" onclick="salvarPrestador()">Salvar</button>
            </div>
            <div class="card">
                <button onclick="voltarEtapa()">Voltar</button>
                <button class="acao" onclick="proximaEtapa()">Próximo</button>
            </div>
        </div>
    </div>

    <div id="painel" class="aba">
        <div class="card">
            Hoje: <strong id="hoje">0</strong><br>
            Total: <strong id="total">0</strong>
        </div>
        <div class="card"><div id="lista-agendamentos"></div></div>
    </div>
</div>

<script>
    /* ===== DADOS ===== */
    const produtos = {
        "Telemetria": [
            {desc:"Instalado veículos leves bloqueador", tempo:60},
            {desc:"Instalado veículos leves e pesados + CAN", tempo:60},
            {desc:"Instalado motos ou maquinários", tempo:40},
            {desc:"Instalado veículos leves e pesados", tempo:40}
        ],
        "Identificador": [
            {desc:"Instalado veículos leves e pesados identificador", tempo:60},
            {desc:"Instalado veículos leves e pesados identificador + CAN", tempo:90},
            {desc:"Instalado veículos leves e pesados identificador RFID", tempo:60},
            {desc:"Instalado veículos leves e pesados identificador RFID + CAN", tempo:80}
        ],
        "Trava de ignição": [
            {desc:"Instalado veículos leves imobilizador", tempo:80},
            {desc:"Instalado veículos leves imobilizador RFID", tempo:80},
            {desc:"Instalado veículos leves imobilizador RFID + CAN", tempo:90},
            {desc:"Instalado veículos leves imobilizador + CAN", tempo:100}
        ],
        "Videotelemetria": [
            {desc:"CobliCam (2 câmeras)", tempo:90},
            {desc:"Cobli Multicam (3 câmeras internas)", tempo:120},
            {desc:"Cobli Multicam (2 câmeras + 1 externa)", tempo:240},
            {desc:"Cobli Multicam (4 câmeras)", tempo:240},
            {desc:"Cobli Multicam (5 câmeras)", tempo:300}
        ]
    };

    /* ===== VARIÁVEIS GLOBAIS ===== */
    let prestadores = [];
    let agendamentos = [];
    let agendaPrestador = {};
    let etapa = 1;
    let prestadorSelecionadoIndex = null;
    let prestadorEditando = null;
    let totalHorasNecessarias = 0;
    let itensSelecionados = [];
    let horariosSelecionados = [];

    // Inicialização
    window.onload = carregarProdutos;

    function carregarProdutos(){
        let select = document.getElementById("produto");
        Object.keys(produtos).forEach(tipo => {
            produtos[tipo].forEach(p => {
                let opt = document.createElement("option");
                opt.value = p.tempo;
                opt.text = `${tipo} - ${p.desc} (${p.tempo} min/veic)`;
                select.appendChild(opt);
            });
        });
    }

    function trocarAba(id, botao){
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('ativo'));
        botao.classList.add('ativo');
    }

    function adicionarProduto(){
        let select = document.getElementById("produto");
        let tempo = parseInt(select.value);
        let qtd = parseInt(document.getElementById("quantidade").value || 0);

        if(qtd <= 0) { alert("Informe quantidade válida"); return; }

        itensSelecionados.push({texto: select.options[select.selectedIndex].text, tempo, qtd});
        renderizarListaProdutos();
    }

    function renderizarListaProdutos(){
        let c = document.getElementById("lista-produtos");
        c.innerHTML = "";
        let totalMinutos = 0;

        itensSelecionados.forEach((item, index) => {
            totalMinutos += (item.tempo * item.qtd);
            let d = document.createElement("div");
            d.innerHTML = `${item.texto} | ${item.qtd}x <button onclick="removerProduto(${index})">X</button>`;
            c.appendChild(d);
        });

        totalHorasNecessarias = Math.ceil(totalMinutos / 60);
        document.getElementById("tempoTotalExibicao").innerText = `${(totalMinutos/60).toFixed(1)}h (Exige ${totalHorasNecessarias} slot(s))`;
    }

    function removerProduto(i){
        itensSelecionados.splice(i,1);
        renderizarListaProdutos();
    }

    /* ===== CADASTRO (Simplificado para o exemplo) ===== */
    function abrirCadastro(){
        document.getElementById("lista-prestadores-view").style.display="none";
        document.getElementById("cadastro-flow").style.display="block";
    }

    function proximaEtapa(){
        if(etapa < 4){
            document.getElementById("etapa"+etapa).style.display="none";
            etapa++;
            document.getElementById("etapa"+etapa).style.display="block";
            document.getElementById("etapaAtual").innerText = etapa;
            if(etapa === 3) gerarAgenda();
        }
    }

    function voltarEtapa(){
        if(etapa > 1){
            document.getElementById("etapa"+etapa).style.display="none";
            etapa--;
            document.getElementById("etapa"+etapa).style.display="block";
            document.getElementById("etapaAtual").innerText = etapa;
        }
    }

    function gerarAgenda(){
        const dias=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
        let c=document.getElementById("agenda-semana");
        c.innerHTML="";
        dias.forEach(d => {
            let div=document.createElement("div");
            div.innerHTML=`<strong>${d}</strong><br>`;
            for(let h=8;h<=18;h++){
                let b=document.createElement("button");
                b.innerText=h;
                b.onclick=()=>{
                    if(!agendaPrestador[d]) agendaPrestador[d]=[];
                    if(agendaPrestador[d].includes(h)){
                        agendaPrestador[d] = agendaPrestador[d].filter(x => x !== h);
                        b.style.background="";
                    } else {
                        agendaPrestador[d].push(h);
                        b.style.background="#2F4EA1"; b.style.color="white";
                    }
                };
                div.appendChild(b);
            }
            c.appendChild(div);
        });
    }

    function salvarPrestador(){
        let p = {
            nome: document.getElementById("nome").value,
            agenda: JSON.parse(JSON.stringify(agendaPrestador))
        };
        prestadores.push(p);
        resetCadastro();
        renderizarPrestadores();
    }

    function resetCadastro(){
        document.getElementById("cadastro-flow").style.display="none";
        document.getElementById("lista-prestadores-view").style.display="block";
        etapa=1;
        agendaPrestador={};
        document.querySelectorAll(".etapa").forEach((e,i)=>e.style.display=i===0?"block":"none");
    }

    function renderizarPrestadores(){
        let l = document.getElementById("lista-prestadores");
        l.innerHTML = "";
        prestadores.forEach((p,i) => {
            l.innerHTML += `<div><strong>${p.nome}</strong> <button onclick="excluirPrestador(${i})">Excluir</button></div>`;
        });
    }

    function excluirPrestador(i){ prestadores.splice(i,1); renderizarPrestadores(); }

    /* ===== AGENDAMENTO ===== */
    function buscar(){
        if(prestadores.length === 0){ alert("Cadastre um prestador"); return; }
        document.getElementById("fluxo-agendamento").style.display="block";
        let c = document.getElementById("prestadorSelecionado");
        c.innerHTML="<strong>Escolha o prestador:</strong><br>";
        prestadores.forEach((p,i) => {
            let b = document.createElement("button");
            b.innerText=p.nome;
            b.onclick=()=>selecionarPrestador(i);
            c.appendChild(b);
        });
    }

    function selecionarPrestador(i){
        prestadorSelecionadoIndex = i;
        agendaPrestador = prestadores[i].agenda;
        mostrarAgenda();
    }

    function mostrarAgenda(){
        let c = document.getElementById("horarios");
        c.innerHTML="";
        horariosSelecionados=[];
        Object.keys(agendaPrestador).forEach(d => {
            let div=document.createElement("div");
            div.innerHTML=`<strong>${d}</strong><br>`;
            agendaPrestador[d].forEach(h => {
                let b=document.createElement("button");
                b.innerText=h;
                b.onclick=()=>{
                    if(horariosSelecionados.includes(h)){
                        horariosSelecionados = horariosSelecionados.filter(x=>x!==h);
                        b.style.background="";
                    } else {
                        horariosSelecionados.push(h);
                        b.style.background="#2F4EA1"; b.style.color="white";
                    }
                    validarTempo();
                };
                div.appendChild(b);
            });
            c.appendChild(div);
        });
    }

    function validarTempo(){
        let alerta = document.getElementById("alertaTempo");
        if(horariosSelecionados.length < totalHorasNecessarias){
            alerta.innerText = `Selecione pelo menos ${totalHorasNecessarias} horas para este serviço.`;
        } else {
            alerta.innerText = "";
        }
    }

    function concluirAgendamento(){
        if(horariosSelecionados.length < totalHorasNecessarias){ alert("Tempo insuficiente selecionado"); return; }
        agendamentos.push({
            prestador: prestadores[prestadorSelecionadoIndex].nome,
            data: new Date().toLocaleDateString(),
            horarios: horariosSelecionados
        });
        alert("Agendado com sucesso!");
        renderizarPainel();
    }

    function renderizarPainel(){
        let l = document.getElementById("lista-agendamentos");
        l.innerHTML = agendamentos.map(a => `<div>${a.prestador} - ${a.data} (${a.horarios.join(', ')})</div>`).join('');
        document.getElementById("hoje").innerText = agendamentos.length;
        document.getElementById("total").innerText = agendamentos.length;
    }

</script>
</body>
</html>
