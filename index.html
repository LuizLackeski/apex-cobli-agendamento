<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Projeto Apex</title>
  <style>
    body { font-family: Arial; margin: 0; }
    nav { background: #222; padding: 10px; }
    nav button {
      color: white; background: none; border: none;
      margin-right: 15px; cursor: pointer;
    }
    .aba { display: none; padding: 20px; }
    .ativa { display: block; }
  </style>
</head>
<body>

<nav>
  <button onclick="abrirAba('consulta')">Consulta</button>
  <button onclick="abrirAba('cadastro')">Cadastro Prestador</button>
  <button onclick="abrirAba('painel')">Painel</button>
</nav>

<!-- ABA 1 -->
<div id="consulta" class="aba ativa">
  <h2>Consulta de Endereço e Disponibilidade</h2>

  <input placeholder="Digite o endereço">
  <input placeholder="Raio (km)">

  <button>Buscar Prestadores</button>

  <h3>Resultados</h3>
  <div id="lista-prestadores"></div>

  <hr>

  <h3>Reserva de Agenda</h3>

  <select>
    <option>Produto A - 1h</option>
    <option>Produto B - 2h</option>
  </select>

  <input type="number" placeholder="Quantidade">

  <p>Tempo estimado: <strong>0h</strong></p>

  <h4>Selecionar Horários</h4>
  <div id="horarios"></div>

</div>

<!-- ABA 2 -->
<div id="cadastro" class="aba">
  <h2>Cadastro de Prestador</h2>

  <input placeholder="Nome"><br><br>
  <input placeholder="Endereço"><br><br>
  <input placeholder="Contato"><br><br>
  <input placeholder="Email"><br><br>
  <input type="number" placeholder="Qtd Técnicos"><br><br>

  <h3>Disponibilidade</h3>
  <p>Selecione horários:</p>

  <div id="agenda-cadastro"></div>

  <button>Salvar Prestador</button>
</div>

<!-- ABA 3 -->
<div id="painel" class="aba">
  <h2>Painel de Acompanhamento</h2>

  <h4>Filtros</h4>
  <input type="date" id="data-inicio">
  <input type="date" id="data-fim">

  <select id="filtro-prestador">
    <option value="">Todos Prestadores</option>
  </select>

  <button onclick="filtrarAgendamentos()">Filtrar</button>

  <hr>

  <h3>Agendamentos Realizados</h3>
  <div id="lista-agendamentos"></div>
</div>
