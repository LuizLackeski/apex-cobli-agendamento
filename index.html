<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>APEX - Sistema Completo</title>

<style>
:root { --primary: #2F4EA1; --bg: #f4f6f8; }

body { font-family: 'Segoe UI', sans-serif; background:var(--bg); margin:0; padding:20px; }

.topo { background: var(--primary); color: white; padding: 15px 30px; }

.menu { background: #1F3C88; padding: 10px 30px; display: flex; }

.menu button { background: none; border: none; color: #cbd5e1; margin-right: 20px; cursor: pointer; padding: 10px; }

.menu button.ativo { color: white; border-bottom: 2px solid #4da3ff; }

.conteudo { padding: 40px; max-width: 1000px; margin: 0 auto; }

.aba { display: none; }
.aba.ativa { display: block; }

.card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

.agenda-grid { display: block; }

.cell {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    border-radius: 4px;
    font-size: 0.8rem;
    margin: 2px;
    display: inline-block;
    min-width: 60px;
}

.cell.selecionado {
    background: var(--primary);
    color: white;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
}

button.acao {
    background: #4C5EB0;
    color: white;
    border: none;
    padding: 12px;
    cursor: pointer;
    border-radius: 8px;
    width: 100%;
}

.item-lista {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<div class="topo"><strong>APEX</strong> <span>Agenda Prestadores</span></div>

<div class="menu">
<button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
<button onclick="trocarAba('cadastro', this)">Prestadores</button>
<button onclick="trocarAba('painel', this)">Painel</button>
</div>

<div class="conteudo">

<!-- ================= AGENDAMENTO ================= -->
<div id="consulta" class="aba ativa">

<div id="step-cep" class="card">
<h2>Novo Agendamento</h2>
<input type="text" id="inputCep" placeholder="Digite o CEP">
<button class="acao" onclick="iniciarAgendamento()">Buscar</button>
</div>

<div id="step-agendamento" class="card" style="display:none;">

<h3>Prestador</h3>
<select id="selectPrestador" onchange="renderizarAgendaAgendamento()"></select>

<h3>Serviços</h3>
<select id="produto"></select>
<input type="number" id="quantidade" value="1">
<button onclick="adicionarProduto()">Adicionar</button>

<div id="lista-produtos"></div>

<p><strong>Horas: <span id="horasNecessarias">0</span></strong></p>

<h3>Agenda</h3>
<div id="agenda-agendamento"></div>

<button onclick="concluirAgendamento()">Finalizar</button>

</div>
</div>

<!-- ================= CADASTRO ================= -->
<div id="cadastro" class="aba">

<div id="lista-prestadores-view" class="card">
<button class="acao" onclick="abrirCadastro()">+ Novo Prestador</button>
<div id="lista-prestadores"></div>
</div>

<div id="cadastro-flow" class="card" style="display:none;">

<div id="etapa-1" class="etapa-form">
<h3>Dados</h3>
<input id="nomeEmpresa" placeholder="Razão Social">
<input id="endereco" placeholder="Endereço">
<input id="cidade" placeholder="Cidade">
<input id="uf" placeholder="UF">
<input id="cep" placeholder="CEP">
<input id="responsavel" placeholder="Responsável">
<input id="contatoResponsavel" placeholder="Contato">
</div>

<div id="etapa-2" class="etapa-form" style="display:none;">
<h3>Agenda</h3>
<input id="qtdTecnicos" type="number" placeholder="Técnicos">
<input id="raio" type="number" max="100" placeholder="Raio 100km">
<div id="agenda-cadastro"></div>
</div>

<button onclick="mudarEtapa(-1)">Voltar</button>
<button onclick="mudarEtapa(1)" id="btnProximo">Próximo</button>
<button onclick="salvarPrestador()" id="btnSalvar" style="display:none;">Concluir</button>

</div>
</div>

<!-- ================= PAINEL ================= -->
<div id="painel" class="aba">
<div class="card">Painel</div>
</div>

</div>

<script>

/* ================= DADOS ================= */

let prestadores = [];
let itensSelecionados = [];
let etapa = 1;
let editingIndex = -1;

/* ================= INICIAL ================= */

window.onload = () => criarGrid('agenda-cadastro');

/* ================= ABAS ================= */

function trocarAba(id, btn){
document.querySelectorAll('.aba').forEach(a=>a.classList.remove('ativa'));
document.getElementById(id).classList.add('ativa');
document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('ativo'));
btn.classList.add('ativo');
}

/* ================= CADASTRO ================= */

function abrirCadastro(index=-1){

editingIndex = index;

document.getElementById("lista-prestadores-view").style.display="none";
document.getElementById("cadastro-flow").style.display="block";

etapa = 1;

document.getElementById("etapa-1").style.display="block";
document.getElementById("etapa-2").style.display="none";

document.getElementById("btnProximo").style.display="inline";
document.getElementById("btnSalvar").style.display="none";

/* limpa */
document.querySelectorAll('#cadastro-flow input').forEach(i=>i.value="");
document.querySelectorAll('#agenda-cadastro .cell').forEach(c=>c.classList.remove('selecionado'));

/* edição */
if(index !== -1){
let p = prestadores[index];

nomeEmpresa.value=p.nome||"";
endereco.value=p.endereco||"";
cidade.value=p.cidade||"";
uf.value=p.uf||"";
cep.value=p.cep||"";
responsavel.value=p.responsavel||"";
contatoResponsavel.value=p.contato||"";
qtdTecnicos.value=p.qtdTecnicos||"";
raio.value=p.raio||"";

p.agenda.forEach(h=>{
document.querySelectorAll('#agenda-cadastro .cell')
.forEach(c=>{ if(c.innerText===h) c.classList.add('selecionado') });
});
}
}

/* ================= ETAPAS ================= */

function mudarEtapa(dir){

document.getElementById("etapa-"+etapa).style.display="none";

etapa += dir;

if(etapa < 1) etapa = 1;
if(etapa > 2) etapa = 2;

document.getElementById("etapa-"+etapa).style.display="block";

document.getElementById("btnProximo").style.display = etapa === 2 ? "none" : "inline";
document.getElementById("btnSalvar").style.display = etapa === 2 ? "inline" : "none";
}

/* ================= AGENDA ================= */

function criarGrid(id){

const grid = document.getElementById(id);
grid.innerHTML = "";

const dias = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

dias.forEach(d => {

let row = document.createElement("div");
row.style.marginBottom = "5px";

let label = document.createElement("div");
label.innerText = d;
label.style.fontWeight = "bold";
label.style.width = "120px";
label.style.display = "inline-block";

row.appendChild(label);

for(let h=8; h<=18; h++){

let cell = document.createElement("div");
cell.className = "cell";
cell.innerText = `${h}:00`;

cell.onclick = () => cell.classList.toggle("selecionado");

row.appendChild(cell);
}

grid.appendChild(row);
});
}

/* ================= SALVAR (CORRIGIDO FINAL) ================= */

function salvarPrestador(){

let agenda = [];

document.querySelectorAll('#agenda-cadastro .cell.selecionado')
.forEach(c => agenda.push(c.innerText));

let dados = {
nome: nomeEmpresa.value,
endereco: endereco.value,
cidade: cidade.value,
uf: uf.value,
cep: cep.value,
responsavel: responsavel.value,
contato: contatoResponsavel.value,
qtdTecnicos: qtdTecnicos.value,
raio: Math.min(100, raio.value || 0),
agenda: agenda
};

if(editingIndex === -1){
prestadores.push(dados);
} else {
prestadores[editingIndex] = dados;
}

renderizarListaPrestadores();
atualizarSelectPrestadores();

document.getElementById("lista-prestadores-view").style.display="block";
document.getElementById("cadastro-flow").style.display="none";

etapa = 1;
}

/* ================= LISTA ================= */

function renderizarListaPrestadores(){

let l = document.getElementById("lista-prestadores");

l.innerHTML = prestadores.map((p,i)=>`
<div class="card">
<strong>${p.nome}</strong>
<button onclick="abrirCadastro(${i})">Editar</button>
<button onclick="excluirPrestador(${i})">Excluir</button>
</div>
`).join('');
}

function excluirPrestador(i){
prestadores.splice(i,1);
renderizarListaPrestadores();
atualizarSelectPrestadores();
}

/* ================= SELECT ================= */

function atualizarSelectPrestadores(){

let sel = document.getElementById("selectPrestador");

sel.innerHTML = '<option value="">-- Escolha --</option>';

prestadores.forEach((p,i)=>{
sel.innerHTML += `<option value="${i}">${p.nome}</option>`;
});
}

</script>

</body>
</html>
