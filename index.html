<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>APEX</title>

<style>
body { margin:0; font-family: Arial; background:#f4f6f8; }

.topo { background:#2F4EA1; color:white; padding:15px 30px; display:flex; justify-content:space-between; }
.menu { background:#1F3C88; padding:10px 30px; }

.menu button {
  background:none; border:none; color:#cbd5e1;
  margin-right:20px; font-size:16px; cursor:pointer;
}
.menu button.ativo { color:white; border-bottom:2px solid #4da3ff; }

.conteudo { padding:30px; }
.aba { display:none; }
.ativa { display:block; }

.card {
  background:white; padding:20px;
  border-radius:8px; margin-bottom:20px;
}

input, select { padding:8px; margin:5px; }

button {
  padding:6px 10px;
  margin:3px;
  cursor:pointer;
}

button.acao {
  background:#2F4EA1; color:white;
  border:none; border-radius:4px;
}

.hora {
  border:1px solid #ccc;
  background:white;
}

.hora.ativa {
  background:#2F4EA1;
  color:white;
}
</style>
</head>

<body>

<div class="topo">
  <strong>APEX</strong>
</div>

<div class="menu">
  <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
  <button onclick="trocarAba('cadastro', this)">Prestadores</button>
</div>

<div class="conteudo">

<!-- AGENDAMENTO -->
<div id="consulta" class="aba ativa">
  <div class="card">
    <input id="enderecoBusca" placeholder="Endereço ou CEP">
    <button class="acao" onclick="buscar()">Buscar</button>
  </div>

  <div id="fluxo-agendamento" style="display:none;">
    <div class="card" id="prestadorSelecionado"></div>

    <div class="card">
      <select id="produto"></select>
      <input type="number" id="quantidade" placeholder="Qtd">
      <button class="acao" onclick="adicionarItem()">Adicionar</button>

      <div id="lista-itens"></div>
      <p>Total: <strong id="tempoTotal">0h</strong></p>
    </div>
  </div>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="aba">

  <div class="card">
    <input id="nome" placeholder="Nome"><br>
    <input id="tecnicos" placeholder="Técnicos"><br>
    <input id="endereco" placeholder="Endereço"><br>
    <input id="raio" placeholder="Raio"><br>
  </div>

  <div class="card">
    <h3>Agenda</h3>
    <div id="agenda"></div>
  </div>

  <div class="card">
    <button class="acao" onclick="salvarPrestador()">Salvar</button>
  </div>

</div>

</div>

<script>

/* ===== DADOS ===== */
let prestadores = [];
let agendaPrestador = {
  Seg: [], Ter: [], Qua: [], Qui: [], Sex: []
};

let itensAgendamento = [];
let tempoTotal = 0;

/* ===== PRODUTOS ===== */
const produtos = [
  { tipo:"TELEMETRIA", desc:"Leves e pesados", tempo:40 },
  { tipo:"IDENTIFICADOR", desc:"Identificador + CAN", tempo:90 },
  { tipo:"TRAVA", desc:"Imobilizador", tempo:80 }
];

/* ===== FORMATAR ===== */
function formatarTipo(t){
  return t.toLowerCase().replace(/(^\w|\s\w)/g, l => l.toUpperCase());
}

/* ===== INIT ===== */
window.onload = function(){
  carregarProdutos();
  gerarAgenda();
};

function carregarProdutos(){
  let s = document.getElementById("produto");
  produtos.forEach((p,i)=>{
    let o = document.createElement("option");
    o.value = i;
    o.text = formatarTipo(p.tipo) + " - " + p.desc;
    s.appendChild(o);
  });
}

/* ===== ABAS ===== */
function trocarAba(id, btn){
  document.querySelectorAll(".aba").forEach(a=>a.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");

  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("ativo"));
  btn.classList.add("ativo");
}

/* ===== AGENDA (CORRIGIDO) ===== */
function gerarAgenda(){

  const dias = ["Seg","Ter","Qua","Qui","Sex"];
  const container = document.getElementById("agenda");
  container.innerHTML = "";

  dias.forEach(dia => {

    let linha = document.createElement("div");
    linha.innerHTML = "<strong>" + dia + "</strong><br>";

    for(let h=8; h<=18; h++){

      let btn = document.createElement("button");
      btn.innerText = h;
      btn.className = "hora";

      btn.onclick = function(){

        if(agendaPrestador[dia].includes(h)){
          agendaPrestador[dia] = agendaPrestador[dia].filter(x => x !== h);
          btn.classList.remove("ativa");
        } else {
          agendaPrestador[dia].push(h);
          btn.classList.add("ativa");
        }

        console.log(agendaPrestador);
      };

      linha.appendChild(btn);
    }

    container.appendChild(linha);
  });
}

/* ===== SALVAR PRESTADOR ===== */
function salvarPrestador(){

  const temHorario = Object.values(agendaPrestador).some(d => d.length > 0);

  if(!temHorario){
    alert("Selecione horários!");
    return;
  }

  prestadores.push({
    nome: nome.value,
    agenda: JSON.parse(JSON.stringify(agendaPrestador))
  });

  alert("Prestador salvo!");
  console.log(prestadores);

  // reset
  agendaPrestador = { Seg: [], Ter: [], Qua: [], Qui: [], Sex: [] };
  gerarAgenda();
}

/* ===== AGENDAMENTO ===== */
function buscar(){

  if(prestadores.length === 0){
    alert("Cadastre prestador primeiro");
    return;
  }

  let div = document.getElementById("prestadorSelecionado");
  div.innerHTML = "";

  prestadores.forEach(p=>{
    let b = document.createElement("button");
    b.innerText = p.nome;
    b.onclick = ()=> div.innerHTML = p.nome;
    div.appendChild(b);
  });

  document.getElementById("fluxo-agendamento").style.display = "block";
}

/* ===== ITENS ===== */
function adicionarItem(){

  let p = produtos[produto.value];
  let q = parseInt(quantidade.value);

  if(!q) return alert("Qtd inválida");

  itensAgendamento.push({tipo:p.tipo, nome:p.desc, tempo:p.tempo, qtd:q});
  renderizarItens();
}

function renderizarItens(){

  let div = document.getElementById("lista-itens");
  div.innerHTML = "";
  tempoTotal = 0;

  itensAgendamento.forEach((i,index)=>{

    tempoTotal += i.tempo * i.qtd;

    let d = document.createElement("div");
    d.innerHTML = `
      <strong>${formatarTipo(i.tipo)}</strong> - ${i.nome} (${i.qtd})
      <button onclick="removerItem(${index})">X</button>
    `;
    div.appendChild(d);
  });

  document.getElementById("tempoTotal").innerText = (tempoTotal/60).toFixed(1) + "h";
}

function removerItem(i){
  itensAgendamento.splice(i,1);
  renderizarItens();
}

</script>

</body>
</html>
