<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>APEX - Sistema Completo</title>
    <style>
        :root { --primary: #2F4EA1; --bg: #f4f6f8; }
        body { font-family: 'Segoe UI', sans-serif; background:var(--bg); margin:0; padding:20px; }
        .topo { background: var(--primary); color: white; padding: 15px 30px; }
        .menu { background: #1F3C88; padding: 10px 30px; display: flex; }
        .menu button { background: none; border: none; color: #cbd5e1; margin-right: 20px; cursor: pointer; padding: 10px; }
        .menu button.ativo { color: white; border-bottom: 2px solid #4da3ff; }
        .conteudo { padding: 40px; max-width: 1000px; margin: 0 auto; }
        .aba { display: none; } .aba.ativa { display: block; }
        .card { background: white; padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .cell { border: 1px solid #ddd; padding: 8px; text-align: center; cursor: pointer; border-radius: 4px; font-size: 0.75rem; display: inline-flex; align-items: center; justify-content: center; width: 80px; height: 35px; margin: 2px; }
        .cell.selecionado { background: var(--primary); color: white; }
        .row-dia { display: flex; align-items: center; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { cursor: pointer; }
        /* Dashboard */
        .flex-cards { display: flex; gap: 20px; margin-bottom: 20px; }
        .stats-card { background: white; padding: 20px; border-radius: 12px; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="topo"><strong>APEX</strong> <span>Agenda Prestadores</span></div>

<div class="menu">
    <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
    <button onclick="trocarAba('cadastro', this)">Prestadores</button>
    <button onclick="trocarAba('painel', this)">Painel</button>
</div>

<div class="conteudo">
    <div id="consulta" class="aba ativa">
        <div id="step-1" class="card">
            <h2>Novo Agendamento</h2>
            <input type="text" id="inputCep" placeholder="CEP">
            <button onclick="buscarPrestador()">Buscar</button>
        </div>
        <div id="step-2" class="card" style="display:none;">
            <h3>Prestador Encontrado: <span id="prestadorNome"></span></h3>
            <select id="produto"></select>
            <input type="number" id="quantidade" value="1">
            <button onclick="adicionarProduto()">Adicionar</button>
            <div id="lista-produtos"></div>
            <button onclick="carregarSlots()">Ver Slots (Próximas 2 semanas)</button>
        </div>
        <div id="step-3" class="card" style="display:none;">
            <h3>Selecione o Horário</h3>
            <div id="agenda-dinamica"></div>
            <button onclick="passo(4)">Próximo</button>
        </div>
        <div id="step-4" class="card" style="display:none;">
            <h3>Dados do Atendimento</h3>
            <input id="chamado" placeholder="Número Chamado">
            <input id="endAtend" placeholder="Endereço">
            <button onclick="finalizarAgendamento()">Confirmar</button>
        </div>
    </div>

    <div id="cadastro" class="aba">
        <div id="lista-prestadores-view" class="card">
            <button onclick="abrirCadastro()">+ Novo Prestador</button>
            <div id="lista-prestadores"></div>
        </div>
        <div id="cadastro-flow" class="card" style="display:none;">
            <input id="nomeEmpresa" placeholder="Nome">
            <h3>Agenda</h3>
            <div id="agenda-cadastro"></div>
            <button onclick="salvarPrestador()">Concluir</button>
        </div>
    </div>

    <div id="painel" class="aba">
        <div class="flex-cards">
            <div class="stats-card">HOJE<br><strong>0</strong></div>
            <div class="stats-card">TOTAL<br><strong id="total-agend">0</strong></div>
            <div class="stats-card">PRESTADORES<br><strong id="total-prest">0</strong></div>
        </div>
        <input type="date" onchange="renderPainel()">
        <div id="painel-conteudo"></div>
    </div>
</div>

<script>
    let prestadores = [];
    let agendamentos = [];
    let itensSelecionados = [];

    function trocarAba(id, btn) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.getElementById(id).classList.add('ativa');
        document.querySelectorAll('.menu button').forEach(b => b.classList.remove('ativo'));
        if(btn) btn.classList.add('ativo');
        if(id === 'painel') renderPainel();
    }

    function passo(n) {
        [1,2,3,4].forEach(i => document.getElementById('step-'+i).style.display = (i==n) ? 'block' : 'none');
    }

    // Busca prestador com base na lista cadastrada
    function buscarPrestador() {
        if(prestadores.length === 0) return alert("Nenhum prestador cadastrado.");
        document.getElementById("prestadorNome").innerText = prestadores[0].nome;
        passo(2);
    }

    function criarGrid(id) {
        let grid = document.getElementById(id); grid.innerHTML = "";
        ["Seg","Ter","Qua","Qui","Sex","Sab"].forEach(d=>{
            let row = document.createElement("div"); row.className="row-dia";
            row.innerHTML = `<div style="width:80px">${d}</div>`;
            for(let h=8;h<=18;h++){
                let cell = document.createElement("div"); cell.className="cell";
                cell.dataset.dia = d; cell.dataset.hora = `${h}:00`;
                cell.innerText = `${h}:00`;
                cell.onclick = () => cell.classList.toggle("selecionado");
                row.appendChild(cell);
            }
            grid.appendChild(row);
        });
    }

    function carregarSlots() {
        let container = document.getElementById("agenda-dinamica");
        container.innerHTML = "";
        let hoje = new Date();
        const diasSemana = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sab"];
        
        // Pega prestador (ex: primeiro da lista)
        let p = prestadores[0]; 
        
        for(let i=0; i<14; i++) {
            let data = new Date();
            data.setDate(hoje.getDate() + i);
            let dNome = diasSemana[data.getDay()];
            
            p.agenda.filter(a => a.dia == dNome).forEach(slot => {
                let div = document.createElement("div");
                div.className = "cell";
                div.innerText = `${dNome} ${slot.hora}`;
                div.onclick = () => div.classList.toggle("selecionado");
                container.appendChild(div);
            });
        }
        passo(3);
    }

    function salvarPrestador(){
        let agenda = [...document.querySelectorAll('#agenda-cadastro .selecionado')].map(c => ({ dia: c.dataset.dia, hora: c.dataset.hora }));
        prestadores.push({ nome: document.getElementById("nomeEmpresa").value, agenda: agenda });
        document.getElementById("total-prest").innerText = prestadores.length;
        alert("Prestador salvo!");
        trocarAba('consulta');
    }

    function finalizarAgendamento(){
        agendamentos.push({ prestador: prestadores[0].nome, data: new Date().toLocaleDateString() });
        document.getElementById("total-agend").innerText = agendamentos.length;
        alert("Agendado!");
        trocarAba('painel');
    }

    function renderPainel() {
        document.getElementById("painel-conteudo").innerHTML = agendamentos.map((a, i) => `
            <div class="card">Agendamento: ${a.prestador} - ${a.data} 
            <button onclick="agendamentos.splice(${i},1); renderPainel()">Excluir</button></div>
        `).join('');
    }

    // Inicialização
    function abrirCadastro() { 
        document.getElementById("lista-prestadores-view").style.display="none"; 
        document.getElementById("cadastro-flow").style.display="block";
        criarGrid("agenda-cadastro"); 
    }
</script>
</body>
</html>
