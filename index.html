<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>APEX</title>

<style>
body { margin:0; font-family: Arial; background:#f4f6f8; }

.topo { background:#2F4EA1; color:white; padding:15px 30px; }
.menu { background:#1F3C88; padding:10px 30px; }

.menu button {
  background:none; border:none; color:#cbd5e1;
  margin-right:20px; cursor:pointer;
}
.menu button.ativo { color:white; border-bottom:2px solid #4da3ff; }

.conteudo { padding:30px; }
.aba { display:none; }
.ativa { display:block; }

.card {
  background:white; padding:20px;
  border-radius:8px; margin-bottom:20px;
}

input, select {
  width:100%; padding:8px; margin:5px 0;
}

.row { display:flex; gap:10px; }
.row input { flex:1; }

button {
  padding:6px 10px;
  margin:3px;
  cursor:pointer;
}

.acao {
  background:#2F4EA1;
  color:white;
  border:none;
  border-radius:4px;
}

/* AGENDA */
.horas { display:flex; flex-wrap:wrap; gap:5px; }
.hora {
  width:50px;
  border:1px solid #ccc;
  background:white;
}
.hora.ativa {
  background:#2F4EA1;
  color:white;
}
</style>
</head>

<body>

<div class="topo"><strong>APEX</strong></div>

<div class="menu">
  <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
  <button onclick="trocarAba('cadastro', this)">Prestadores</button>
  <button onclick="trocarAba('painel', this)">Painel</button>
</div>

<div class="conteudo">

<!-- AGENDAMENTO -->
<div id="consulta" class="aba ativa">

  <div class="card">
    <input id="enderecoBusca" placeholder="Endereço ou CEP">
    <button class="acao" onclick="buscar()">Buscar</button>
  </div>

  <div class="card">
    <h3>Prestadores</h3>
    <div id="lista-prestadores-ag"></div>
  </div>

  <div id="bloco-agendamento" style="display:none;">

    <div class="card">
      <h3>Agenda disponível</h3>
      <div id="agenda-agendamento"></div>
    </div>

    <div class="card">
      <h3>Produtos</h3>

      <select id="produto"></select>
      <input type="number" id="quantidade" placeholder="Qtd">
      <button class="acao" onclick="adicionarItem()">Adicionar</button>

      <div id="lista-itens"></div>
      <p>Total: <strong id="tempoTotal">0h</strong></p>
    </div>

    <div class="card">
      <button class="acao" onclick="concluirAgendamento()">Concluir</button>
    </div>

  </div>

</div>

<!-- CADASTRO -->
<div id="cadastro" class="aba">

  <div id="lista-view" class="card">
    <h3>Prestadores</h3>
    <button class="acao" onclick="abrirCadastro()">+ Cadastrar</button>
    <div id="lista-prestadores"></div>
  </div>

  <div id="form-view" style="display:none;">

    <div class="card">
      <h3>Dados</h3>
      <input id="empresa" placeholder="Empresa">
      <input id="endereco" placeholder="Endereço">

      <div class="row">
        <input id="cidade" placeholder="Cidade">
        <input id="uf" placeholder="UF">
      </div>

      <input id="responsavel" placeholder="Responsável">
      <input id="contato" placeholder="Contato">
    </div>

    <div class="card">
      <h3>Agenda</h3>
      <input id="tecnicos" placeholder="Qtd técnicos">
      <div id="agenda"></div>
    </div>

    <div class="card">
      <button onclick="cancelarCadastro()">Cancelar</button>
      <button class="acao" onclick="salvarPrestador()">Salvar</button>
    </div>

  </div>

</div>

<!-- PAINEL -->
<div id="painel" class="aba">

  <div class="card">
    Hoje: <strong id="hoje">0</strong><br>
    Total: <strong id="total">0</strong>
  </div>

  <div class="card" id="lista-agendamentos"></div>

</div>

</div>

<script>

/* ===== DADOS ===== */
let prestadores = [];
let agendamentos = [];
let agendaPrestador = {};
let prestadorSelecionadoIndex = null;
let itensAgendamento = [];
let tempoTotal = 0;

/* ===== PRODUTOS ===== */
const produtos = [
  { tipo:"Telemetria", desc:"Leves e pesados", tempo:40 },
  { tipo:"Identificador", desc:"Identificador + CAN", tempo:90 },
  { tipo:"Trava", desc:"Imobilizador", tempo:80 }
];

/* ===== INIT ===== */
window.onload = function(){
  carregarProdutos();
};

/* ===== ABAS ===== */
function trocarAba(id, btn){
  document.querySelectorAll(".aba").forEach(a=>a.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");

  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("ativo"));
  btn.classList.add("ativo");
}

/* ===== PRODUTOS ===== */
function carregarProdutos(){
  let s=document.getElementById("produto");
  produtos.forEach((p,i)=>{
    let o=document.createElement("option");
    o.value=i;
    o.text=p.tipo+" - "+p.desc;
    s.appendChild(o);
  });
}

/* ===== CADASTRO ===== */
function abrirCadastro(){
  document.getElementById("lista-view").style.display="none";
  document.getElementById("form-view").style.display="block";
  gerarAgenda();
}

function cancelarCadastro(){
  document.getElementById("lista-view").style.display="block";
  document.getElementById("form-view").style.display="none";
}

function gerarAgenda(){

  const dias=["Seg","Ter","Qua","Qui","Sex","Sab"];
  agendaPrestador = {Seg:[],Ter:[],Qua:[],Qui:[],Sex:[],Sab:[]};

  let c=document.getElementById("agenda");
  c.innerHTML="";

  dias.forEach(d=>{
    let div=document.createElement("div");
    div.innerHTML="<strong>"+d+"</strong>";

    let hDiv=document.createElement("div");
    hDiv.className="horas";

    for(let h=8;h<=18;h++){
      let b=document.createElement("button");
      b.innerText=h;
      b.className="hora";

      b.onclick=()=>{
        if(agendaPrestador[d].includes(h)){
          agendaPrestador[d]=agendaPrestador[d].filter(x=>x!==h);
          b.classList.remove("ativa");
        } else {
          agendaPrestador[d].push(h);
          b.classList.add("ativa");
        }
      };

      hDiv.appendChild(b);
    }

    div.appendChild(hDiv);
    c.appendChild(div);
  });
}

function salvarPrestador(){

  const temAgenda = Object.values(agendaPrestador).some(d=>d.length>0);
  if(!temAgenda){ alert("Selecione horários"); return; }

  prestadores.push({
    empresa: empresa.value,
    agenda: JSON.parse(JSON.stringify(agendaPrestador))
  });

  renderizarPrestadores();
  cancelarCadastro();
}

function renderizarPrestadores(){
  let l=document.getElementById("lista-prestadores");
  l.innerHTML="";

  prestadores.forEach((p,i)=>{
    let d=document.createElement("div");
    d.innerHTML=`
      <strong>${p.empresa}</strong>
      <button onclick="excluirPrestador(${i})">Excluir</button>
      <hr>`;
    l.appendChild(d);
  });

  renderizarPrestadoresAg();
}

function excluirPrestador(i){
  prestadores.splice(i,1);
  renderizarPrestadores();
}

/* ===== AGENDAMENTO ===== */
function buscar(){
  renderizarPrestadoresAg();
}

function renderizarPrestadoresAg(){

  let l=document.getElementById("lista-prestadores-ag");
  l.innerHTML="";

  prestadores.forEach((p,i)=>{
    let b=document.createElement("button");
    b.innerText=p.empresa;

    b.onclick=()=>{
      prestadorSelecionadoIndex=i;
      mostrarAgenda(p);
    };

    l.appendChild(b);
  });
}

function mostrarAgenda(prestador){

  document.getElementById("bloco-agendamento").style.display="block";

  let c=document.getElementById("agenda-agendamento");
  c.innerHTML="";

  Object.keys(prestador.agenda).forEach(dia=>{

    if(prestador.agenda[dia].length===0) return;

    let div=document.createElement("div");
    div.innerHTML="<strong>"+dia+"</strong>";

    let hDiv=document.createElement("div");
    hDiv.className="horas";

    prestador.agenda[dia].forEach(h=>{
      let b=document.createElement("button");
      b.innerText=h;
      b.className="hora";
      b.onclick=()=>b.classList.toggle("ativa");
      hDiv.appendChild(b);
    });

    div.appendChild(hDiv);
    c.appendChild(div);
  });
}

/* ===== ITENS ===== */
function adicionarItem(){
  let p=produtos[produto.value];
  let q=parseInt(quantidade.value||0);
  if(!q) return alert("Qtd inválida");

  itensAgendamento.push({nome:p.desc,tempo:p.tempo,qtd:q});
  renderizarItens();
}

function renderizarItens(){
  let c=document.getElementById("lista-itens");
  c.innerHTML="";
  tempoTotal=0;

  itensAgendamento.forEach((i,index)=>{
    tempoTotal+=i.tempo*i.qtd;

    let d=document.createElement("div");
    d.innerHTML=`
      ${i.nome} (${i.qtd})
      <button onclick="removerItem(${index})">X</button>
    `;
    c.appendChild(d);
  });

  document.getElementById("tempoTotal").innerText=(tempoTotal/60).toFixed(1)+"h";
}

function removerItem(i){
  itensAgendamento.splice(i,1);
  renderizarItens();
}

/* ===== FINALIZAR ===== */
function concluirAgendamento(){

  if(prestadorSelecionadoIndex===null){
    alert("Selecione prestador");
    return;
  }

  agendamentos.push({
    prestador: prestadores[prestadorSelecionadoIndex].empresa,
    data: new Date().toISOString().split("T")[0]
  });

  renderizarPainel();
  alert("Agendado!");
}

/* ===== PAINEL ===== */
function renderizarPainel(){

  let hoje=new Date().toISOString().split("T")[0];

  document.getElementById("hoje").innerText =
    agendamentos.filter(a=>a.data===hoje).length;

  document.getElementById("total").innerText=agendamentos.length;

  let l=document.getElementById("lista-agendamentos");
  l.innerHTML="";

  agendamentos.forEach(a=>{
    let d=document.createElement("div");
    d.innerText=a.prestador+" - "+a.data;
    l.appendChild(d);
  });
}

</script>

</body>
</html>
