<script>
let prestadores = [];
let itensSelecionados = [];
let agendamentos = [];
let etapa = 1;
let editingIndex = -1;

const produtos = {
    "Telemetria": [{desc:"Instalado veículos leves bloqueador", tempo:60}, {desc:"Instalado veículos leves e pesados + CAN", tempo:60}, {desc:"Instalado motos ou maquinários", tempo:40}, {desc:"Instalado veículos leves e pesados", tempo:40}],
    "Identificador": [{desc:"Instalado veículos leves e pesados identificador", tempo:60}, {desc:"Instalado veículos leves e pesados identificador + CAN", tempo:90}, {desc:"Instalado veículos leves e pesados identificador RFID", tempo:60}, {desc:"Instalado veículos leves e pesados identificador RFID + CAN", tempo:80}],
    "Trava de ignição": [{desc:"Instalado veículos leves imobilizador", tempo:80}, {desc:"Instalado veículos leves imobilizador RFID", tempo:80}, {desc:"Instalado veículos leves imobilizador RFID + CAN", tempo:90}, {desc:"Instalado veículos leves imobilizador + CAN", tempo:100}],
    "Videotelemetria": [{desc:"CobliCam (2 câmeras)", tempo:90}, {desc:"Cobli Multicam (3 câmeras internas)", tempo:120}, {desc:"Cobli Multicam (2 câmeras + 1 externa)", tempo:240}, {desc:"Cobli Multicam (4 câmeras)", tempo:240}, {desc:"Cobli Multicam (5 câmeras)", tempo:300}]
};

window.onload = () => { carregarProdutos(); };

function trocarAba(id, btn){
    document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');
    document.querySelectorAll('.menu button').forEach(b => b.classList.remove('ativo'));
    if(btn) btn.classList.add('ativo');
}

function atualizarSelectPrestadores(){
    let sel = document.getElementById("selectPrestador");
    sel.innerHTML = '<option value="">-- Escolha --</option>';
    prestadores.forEach((p,i)=>{
        sel.innerHTML += `<option value="${i}">${p.nome}</option>`;
    });
}

function iniciarAgendamento(){
    if(prestadores.length === 0){
        alert("Cadastre um prestador!");
        return;
    }

    atualizarSelectPrestadores(); // 🔥 CORREÇÃO

    document.getElementById("step-cep").style.display="none";
    document.getElementById("step-agendamento").style.display="block";
}

function adicionarProduto(){
    let select = document.getElementById("produto");
    let qtd = parseInt(document.getElementById("quantidade").value) || 1;
    let tempoBase = parseInt(select.value);

    if(!tempoBase){
        alert("Selecione um serviço");
        return;
    }

    itensSelecionados.push({
        desc: select.options[select.selectedIndex].text,
        tempo: tempoBase,
        qtd: qtd
    });

    renderizarProdutos();

    if(document.getElementById("selectPrestador").value !== "") rdaAgendamento();
}

function renderizarProdutos(){
    let totalMinutos = itensSelecionados.reduce((a, b) => a + (b.tempo * b.qtd), 0);

    document.getElementById("horasNecessarias").innerText = Math.ceil(totalMinutos/60);

    document.getElementById("lista-produtos").innerHTML =
    itensSelecionados.map((i, idx) => `
        <div class="item-lista">
            ${i.desc} (Qtd: ${i.qtd})
            <button onclick="itensSelecionados.splice(${idx},1); renderizarProdutos(); rdaAgendamento();">x</button>
        </div>
    `).join('');
}

function carregarProdutos(){
    let select=document.getElementById("produto");
    select.innerHTML="";

    for(let tipo in produtos){
        let group=document.createElement("optgroup");
        group.label=tipo;

        produtos[tipo].forEach(p=>{
            let opt=document.createElement("option");
            opt.value=p.tempo;
            opt.text=p.desc;
            group.appendChild(opt);
        });

        select.appendChild(group);
    }
}

function rdaAgendamento(){
    let idx = document.getElementById("selectPrestador").value;
    if(idx === "") return;

    let totalMinutos = itensSelecionados.reduce((a, b) => a + (b.tempo * b.qtd), 0);
    let horas = Math.ceil(totalMinutos / 60);

    if(horas === 0){
        alert("Adicione um serviço!");
        return;
    }

    let container = document.getElementById("agenda-agendamento");
    container.innerHTML = "";

    let hoje = new Date();
    const diasSemana = ["Seg","Ter","Qua","Qui","Sex","Sab"]; // 🔥 CORREÇÃO

    for(let i=0; i<14; i++){

        let data = new Date();
        data.setDate(hoje.getDate() + i);

        if(data.getDay() === 0) continue; // 🔥 ignora domingo

        let dNome = diasSemana[data.getDay()-1];
        let dStr = data.toLocaleDateString();

        let slots = prestadores[idx].agenda.filter(a => a.dia == dNome);

        if(slots.length > 0){

            let row = document.createElement("div");
            row.className="row-dia";
            row.innerHTML = `<div style="width:80px">${dStr.slice(0,5)}</div>`;

            slots.forEach(item => {

                let div = document.createElement("div");
                div.className = "cell";
                div.innerText = item.hora;
                div.dataset.hora = item.hora;
                div.dataset.date = dStr;

                div.onclick = () => {

                    let totalMinutos = itensSelecionados.reduce((a, b) => a + (b.tempo * b.qtd), 0);
                    let horas = Math.ceil(totalMinutos / 60);

                    let sel = document.querySelectorAll("#agenda-agendamento .selecionado");

                    if(sel.length > 0 && sel[0].dataset.date !== div.dataset.date){
                        sel.forEach(s => s.classList.remove('selecionado'));
                        sel = document.querySelectorAll("#agenda-agendamento .selecionado");
                    }

                    if(!div.classList.contains("selecionado") && sel.length >= horas){
                        alert("Limite de "+horas+"h!");
                        return;
                    }

                    div.classList.toggle("selecionado");
                };

                row.appendChild(div);
            });

            container.appendChild(row);
        }
    }
}

function concluirAgendamento(){

    let idx = document.getElementById("selectPrestador").value;

    if(idx === ""){
        alert("Selecione um prestador!");
        return;
    }

    if(itensSelecionados.length === 0){
        alert("Adicione um serviço!");
        return;
    }

    let sel = document.querySelectorAll("#agenda-agendamento .selecionado");

    if(sel.length === 0){
        alert("Selecione um horário!");
        return;
    }

    let dataRef = sel[0].dataset.date;

    for(let s of sel){
        if(s.dataset.date !== dataRef){
            alert("Todos os horários devem ser do mesmo dia!");
            return;
        }
    }

    let totalMinutos = itensSelecionados.reduce((a, b) => a + (b.tempo * b.qtd), 0);
    let horas = Math.ceil(totalMinutos / 60);

    if(sel.length !== horas){
        alert("Selecione exatamente " + horas + " hora(s)!");
        return;
    }

    agendamentos.push({
        prestador: prestadores[idx].nome,
        data: dataRef,
        slots: [...sel].map(s => s.dataset.hora)
    });

    itensSelecionados = [];
    document.getElementById("lista-produtos").innerHTML = "";
    document.getElementById("horasNecessarias").innerText = "0";
    document.getElementById("quantidade").value = "1";
    document.getElementById("selectPrestador").value = "";
    document.getElementById("agenda-agendamento").innerHTML = "";
    document.getElementById("inputCep").value = "";

    document.getElementById("step-cep").style.display = "block";
    document.getElementById("step-agendamento").style.display = "none";

    document.getElementById("total-agend").innerText = agendamentos.length;

    renderPainel();

    alert("Agendado com sucesso!");
}

function renderPainel(){
    document.getElementById("painel-conteudo").innerHTML =
    agendamentos.map((a, i) => `
        <div class="painel-item">
            ${a.prestador} - ${a.data}
            <button onclick="agendamentos.splice(${i},1); renderPainel()">Excluir</button>
        </div>
    `).join('');
}
</script>
