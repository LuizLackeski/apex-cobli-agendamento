<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>APEX</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

/* TOPO */
.topo {
  background: #2F4EA1;
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
}

.topo strong {
  font-size: 18px;
}

/* MENU */
.menu {
  background: #1F3C88;
  padding: 10px 30px;
}

.menu button {
  background: none;
  border: none;
  color: #cbd5e1;
  margin-right: 20px;
  font-size: 16px;
  cursor: pointer;
  padding-bottom: 5px;
}

.menu button.ativo {
  color: white;
  border-bottom: 2px solid #4da3ff;
}

/* CONTEÚDO */
.conteudo {
  padding: 30px;
}

.aba {
  display: none;
}

.aba.ativa {
  display: block;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 20px;
}

/* INPUTS */
input, select {
  padding: 8px;
  margin-right: 10px;
  margin-top: 10px;
}

button.acao {
  background: #2F4EA1;
  color: white;
  border: none;
  padding: 8px 15px;
  cursor: pointer;
  border-radius: 4px;
}

</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <strong>Cobli | APEX</strong>
  <span>Agenda Prestadores</span>
</div>

<!-- MENU -->
<div class="menu">
  <button class="ativo" onclick="trocarAba('consulta', this)">Agendamento</button>
  <button onclick="trocarAba('cadastro', this)">Prestadores</button>
  <button onclick="trocarAba('painel', this)">Painel</button>
</div>

<!-- CONTEÚDO -->
<div class="conteudo">

  <!-- CONSULTA -->
  <div id="consulta" class="aba ativa">

    <div class="card">
      <h2>Novo Agendamento</h2>

      <input placeholder="Digite o endereço">
      <input placeholder="Raio (km)">
      <button class="acao">Buscar Prestadores</button>
    </div>

    <div class="card">
      <h3>Prestadores disponíveis</h3>
      <div id="lista-prestadores"></div>
    </div>

    <div class="card">
      <h3>Reserva de Agenda</h3>

      <select>
        <option>Produto A - 1h</option>
        <option>Produto B - 2h</option>
      </select>

      <input type="number" placeholder="Quantidade">

      <p>Tempo estimado: <strong>0h</strong></p>

      <h4>Selecionar Horários</h4>
      <div id="horarios"></div>
    </div>

  </div>

  <!-- CADASTRO -->
  <div id="cadastro" class="aba">

    <div class="card">
      <h2>Cadastro de Prestador</h2>

      <input placeholder="Nome"><br>
      <input placeholder="Endereço"><br>
      <input placeholder="Contato"><br>
      <input placeholder="Email"><br>
      <input type="number" placeholder="Qtd Técnicos"><br>

      <h4>Disponibilidade</h4>
      <div id="agenda-cadastro"></div>

      <br>
      <button class="acao">Salvar</button>
    </div>

  </div>

  <!-- PAINEL -->
  <div id="painel" class="aba">

    <div class="card">
      <h2>Painel de Agendamentos</h2>

      <input type="date">
      <input type="date">

      <select>
        <option>Todos Prestadores</option>
      </select>

      <button class="acao">Filtrar</button>
    </div>

    <div class="card">
      <h3>Lista</h3>
      <div id="lista-agendamentos"></div>
    </div>

  </div>

</div>

<script>

function trocarAba(id, botao) {
  // esconder abas
  document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');

  // atualizar menu ativo
  document.querySelectorAll('.menu button').forEach(b => b.classList.remove('ativo'));
  botao.classList.add('ativo');
}

</script>

</body>
</html>
